<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação de Presença</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#d46a92;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

input[type=text]{
width:100%;
padding:12px;
margin:15px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#d46a92;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

label{
display:block;
margin:12px 0;
}
</style>

</head>
<body>

<header>
<h1>Confirmação de Presença</h1>
<p>Angélica & Lucas</p>
</header>

<div class="container">

<input id="nome" type="text" placeholder="Digite seu nome">

<label>
<input type="radio" name="resposta" value="Confirmo" checked>
Confirmo minha presença
</label>

<label>
<input type="radio" name="resposta" value="Não comparecerei">
Não poderei comparecer
</label>

<button onclick="confirmar()">Enviar resposta</button>

</div>

<script>

const SUPABASE_URL="https://jncjiqyakzztfgzldshi.supabase.co";
const SUPABASE_KEY="sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function confirmar(){

const nome=document.getElementById("nome").value.trim();

if(nome===""){
alert("Digite seu nome.");
return;
}

const resposta=document.querySelector('input[name="resposta"]:checked').value;

const {error}=await supabaseClient
.from("Convidados")
.insert([{nome:nome,resposta:resposta}]);

if(error){
alert("Erro ao enviar.");
alert(error.message);
console.log(error);
return;
}

alert("Resposta enviada com sucesso!");

document.getElementById("nome").value="";

}

</script>

</body>
</html>
