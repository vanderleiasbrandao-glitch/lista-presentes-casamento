<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Presença</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; color: #333; }
    header { background: #d46a92; color: white; padding: 40px 20px; text-align: center; }
    h1 { margin: 0; font-size: 26px; }
    .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); box-sizing: border-box; }
    select, button { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    button { background: #d46a92; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
    button:hover { background: #b55376; }
    .radio-group { margin: 25px 0; text-align: left; display: flex; flex-direction: column; gap: 12px; padding-left: 10px; }
    .radio-group label { cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .instrucao { font-size: 16px; color: #555; margin-bottom: 20px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>

  <header>
    <h1>Confirmação de Presença</h1>
  </header>

  <div class="container">
    <p class="instrucao">Ficamos muito felizes em compartilhar este momento com você!<br>Por favor, selecione seu nome na lista abaixo para confirmar:</p>
    
    <select id="selectConvidados">
      <option value="">Carregando lista de convidados...</option>
    </select>

    <div class="radio-group">
      <label><input type="radio" name="presenca" value="Sim! Estarei lá com vocês ❤️" checked> Sim! Estarei lá com vocês ❤️</label>
      <label><input type="radio" name="presenca" value="Não poderei ir"> Não poderei ir, mas desejo toda a felicidade do mundo ✨</label>
    </div>

    <button onclick="enviarResposta()">Enviar Resposta</button>
  </div>

  <script>
    const SUPABASE_URL = "https://jncjiqyakzztfgzldshi.supabase.co";
    // ATT: Substitua o texto abaixo pela sua chave sb_publishable_ que você copiou
    const SUPABASE_KEY = "COLE_AQUI_SUA_CHAVE_SB_PUBLISHABLE"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      global: {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    });

    async function carregarListaPublica() {
      // Puxa os dados da tabela exatamente como está criada (Convidados)
      const { data: lista, error } = await _supabase
        .from('Convidados')
        .select('*')
        .order('nome', { ascending: true });

      if (error) {
        console.error("Erro Supabase:", error);
        document.getElementById("selectConvidados").innerHTML = '<option value="">Erro ao carregar lista</option>';
        return;
      }

      const select = document.getElementById("selectConvidados");
      select.innerHTML = '<option value="">-- Clique aqui para escolher seu nome --</option>';

      if (!lista || lista.length === 0) {
        select.innerHTML = '<option value="">Nenhum convidado localizado no banco.</option>';
        return;
      }

      lista.forEach(convidado => {
        const option = document.createElement("option");
        option.value = convidado.id;
        option.textContent = convidado.nome;
        select.appendChild(option);
      });
    }

    async function enviarResposta() {
      const idConvidado = document.getElementById("selectConvidados").value;
      const textoResposta = document.querySelector('input[name="presenca"]:checked').value;

      if (!idConvidado) {
        alert("Por favor, selecione o seu nome na lista antes de enviar.");
        return;
      }

      const { error } = await _supabase
        .from('Convidados')
        .update({ 
          resposta: textoResposta,
          respondido: true 
        })
        .eq('id', idConvidado);

      if (error) {
        alert("Houve um erro ao salvar sua resposta. Tente novamente.");
        console.error(error);
      } else {
        alert("Sua resposta foi enviada com carinho! Muito obrigado.");
        carregarListaPublica();
      }
    }

    carregarListaPublica();
  </script>
</body>
</html>
