<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel dos Noivos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
    font-family:Arial,sans-serif;
    background:#fdfaf7;
    margin:0;
    padding:15px;
    color:#4a3b32;
}
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:20px 15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(74,59,50,.1);
    border: 1px solid #f3ebe4;
}
h1, h2{
    color:#c26d4c;
    text-align:center;
    margin-left: auto;
    margin-right: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
h1 {
    font-size: 20px;
    margin-top: 10px;
    margin-bottom: 5px;
}
h2 {
    font-size: 18px;
    margin-top: 30px;
    margin-bottom: 15px;
}
@media (min-width: 600px) {
    h1 { font-size: 28px; }
    h2 { font-size: 24px; }
    body { padding: 20px; }
    .container { padding: 25px; }
}
button{
    background:#c26d4c;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    display:block;
    margin:20px auto;
    font-weight:bold;
    transition:background 0.3s;
}
button:hover{
    background:#a45334;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    margin-bottom:40px;
}
th,td{
    border:1px solid #eacfbf;
    padding:10px;
}
th{
    background:#c26d4c;
    color:white;
}
tr:nth-child(even){
    background:#fdfaf7;
}
.col-num {
    text-align: center;
    width: 50px;
    font-weight: bold;
    color: #a45334;
}
</style>
</head>
<body>

<div class="container">
    <h1>Painel de Controle dos Noivos</h1>
    <button onclick="carregarTudo()">Atualizar Listas</button>

    <h2>Confirmação de Presença</h2>
    <table>
        <thead>
            <tr>
                <th style="width: 50px;">Nº</th>
                <th>Nome</th>
                <th>Resposta</th>
            </tr>
        </thead>
        <tbody id="tbConvidados">
            <tr><td colspan="3">Carregando...</td></tr>
        </tbody>
    </table>

    <h2>Presentes Reservados</h2>
    <table>
        <thead>
            <tr>
                <th style="width: 50px;">Nº</th>
                <th>Presente</th>
                <th>Quem escolheu</th>
            </tr>
        </thead>
        <tbody id="tbPresentes">
            <tr><td colspan="3">Carregando...</td></tr>
        </tbody>
    </table>
</div>

<script>
const supabaseClient = supabase.createClient(
    "https://jncjiqyakzztfgzldshi.supabase.co",
    "sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"
);

async function carregarConvidados(){
    const tabela = document.getElementById("tbConvidados");
    tabela.innerHTML = "";

    const { data, error } = await supabaseClient
        .from("convidados")
        .select("*")
        .order("nome");

    if(error){
        tabela.innerHTML = `<tr><td colspan="3">Erro: ${error.message}</td></tr>`;
        console.error(error);
        return;
    }

    if(!data || !data.length){
        tabela.innerHTML = `<tr><td colspan="3">Nenhum convidado.</td></tr>`;
        return;
    }

    data.forEach((c, i) => {
        let resposta = "❌ Ainda não respondeu";
        
        if (c.respondido === true || c.respondido === 'TRUE') {
            resposta = c.resposta || "✅ Confirmado";
        }

        tabela.innerHTML += `
            <tr>
                <td class="col-num">${i + 1}</td>
                <td><strong>${c.nome}</strong></td>
                <td>${resposta}</td>
            </tr>
        `;
    });
}

async function carregarPresentes(){
    const tabela = document.getElementById("tbPresentes");
    tabela.innerHTML = "";

    const { data, error } = await supabaseClient
        .from("presentes")
        .select("*")
        .order("nome");

    if(error){
        tabela.innerHTML = `<tr><td colspan="3">Erro: ${error.message}</td></tr>`;
        console.error(error);
        return;
    }

    let contadorPresentes = 1;
    let encontrou = false;

    if (data) {
        data.forEach(p => {
            if (p.reservado === true || p.reservado === 'TRUE' || p.reservado_por) {
                encontrou = true;
                tabela.innerHTML += `
                    <tr>
                        <td class="col-num">${contadorPresentes}</td>
                        <td>${p.nome}</td>
                        <td>🎁 ${p.reservado_por || "-"}</td>
                    </tr>
                `;
                contadorPresentes++;
            }
        });
    }

    if(!encontrou){
        tabela.innerHTML = `<tr><td colspan="3">Nenhum presente reservado.</td></tr>`;
    }
}

async function carregarTudo(){
    await carregarConvidados();
    await carregarPresentes();
}

carregarTudo();
</script>

</body>
</html>
