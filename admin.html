<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel dos Noivos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f6f6f6;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1,h2{
    color:#d46a92;
    text-align:center;
}

button{

    background:#d46a92;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    display:block;
    margin:20px auto;

}

button:hover{

background:#bf5d83;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;
margin-bottom:40px;

}

th,td{

border:1px solid #ddd;
padding:10px;

}

th{

background:#d46a92;
color:white;

}

tr:nth-child(even){

background:#fafafa;

}

</style>

</head>

<body>

<div class="container">

<h1>Painel de Controle do Casamento</h1>

<button onclick="carregarTudo()">
Atualizar Listas
</button>

<h2>Confirmação de Presença</h2>

<table>

<thead>

<tr>

<th>Nome</th>

<th>Resposta</th>

</tr>

</thead>

<tbody id="tbConvidados">

<tr>

<td colspan="2">
Carregando...
</td>

</tr>

</tbody>

</table>

<h2>Presentes Reservados</h2>

<table>

<thead>

<tr>

<th>Presente</th>

<th>Quem escolheu</th>

</tr>

</thead>

<tbody id="tbPresentes">

<tr>

<td colspan="2">
Carregando...
</td>

</tr>

</tbody>

</table>

</div>

<script>

const supabase = window.supabase.createClient(

"https://jncjiqyakzztfgzldshi.supabase.co",

"sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"

);

async function carregarConvidados(){

const tabela=document.getElementById("tbConvidados");

tabela.innerHTML="";

const {data,error}=await supabase

.from("convidados")

.select("*")

.order("nome");

if(error){

tabela.innerHTML=`<tr><td colspan="2">${error.message}</td></tr>`;

console.error(error);

return;

}

if(!data.length){

tabela.innerHTML=`<tr><td colspan="2">Nenhum convidado.</td></tr>`;

return;

}

data.forEach(c=>{

let resposta="Ainda não respondeu";

if(c.respondido){

resposta=c.resposta || "Confirmado";

}

tabela.innerHTML+=`

<tr>

<td>${c.nome}</td>

<td>${resposta}</td>

</tr>

`;

});

}

async function carregarPresentes(){

const tabela=document.getElementById("tbPresentes");

tabela.innerHTML="";

const {data,error}=await supabase

.from("presentes")

.select("*")

.order("nome");

if(error){

tabela.innerHTML=`<tr><td colspan="2">${error.message}</td></tr>`;

console.error(error);

return;

}

let encontrou=false;

data.forEach(p=>{

if(p.reservado){

encontrou=true;

tabela.innerHTML+=`

<tr>

<td>${p.nome}</td>

<td>${p.reservado_por || "-"}</td>

</tr>

`;

}

});

if(!encontrou){

tabela.innerHTML=`<tr><td colspan="2">Nenhum presente reservado.</td></tr>`;

}

}

async function carregarTudo(){

await carregarConvidados();

await carregarPresentes();

}

carregarTudo();

</script>

</body>

</html>
