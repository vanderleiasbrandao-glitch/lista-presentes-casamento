<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Administrador - Noivos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); }
    h1, h2 { color: #d46a92; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0 40px 0; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #d46a92; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    button { background: #d46a92; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; display: block; margin: 0 auto; }
    button:hover { background: #b55376; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Painel de Controle do Casamento</h1>
    <button onclick="carregarDadosAdmin()">🔄 Atualizar Listas</button>
    
    <!-- TABELA DE CONVIDADOS -->
    <h2>Lista de Convidados e Presenças</h2>
    <table>
      <thead>
        <tr>
          <th>Nome do Convidado</th>
          <th>Presença / Resposta</th>
        </tr>
      </thead>
      <tbody id="tabelaConvidados">
        <tr><td colspan="2">Carregando dados...</td></tr>
      </tbody>
    </table>

    <!-- TABELA DE PRESENTES -->
    <h2>Lista de Presentes Escolhidos</h2>
    <table>
      <thead>
        <tr>
          <th>Presente</th>
          <th>Quem Escolheu</th>
        </tr>
      </thead>
      <tbody id="tabelaPresentes">
        <tr><td colspan="2">Carregando dados...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const SUPABASE_URL = "https://jncjiqyakzztfgzldshi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      global: { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    });

    async function carregarDadosAdmin() {
      // 1. LEITURA DE CONVIDADOS
      const { data: convidados, error: errC } = await _supabase
        .from('convidados')
        .select('*')
        .order('nome', { ascending: true });

      const tbodyC = document.getElementById("tabelaConvidados");
      tbodyC.innerHTML = "";

      if (errC) {
        tbodyC.innerHTML = `<tr><td colspan="2">Erro: ${errC.message}</td></tr>`;
      } else if (!convidados || convidados.length === 0) {
        tbodyC.innerHTML = "<tr><td colspan="2">Nenhum convidado cadastrado.</td></tr>";
      } else {
        convidados.forEach(c => {
          let statusText = "❌ Ainda não respondeu";
          if (c.respondido === true || c.respondido === 'TRUE') {
            statusText = c.resposta || "✅ Confirmado";
          }
          tbodyC.innerHTML += `<tr><td><strong>${c.nome}</strong></td><td>${statusText}</td></tr>`;
        });
      }

      // 2. LEITURA DE PRESENTES (Lendo exatamente as colunas reais 'nome' e 'reservado_por')
      const { data: presentes, error: errP } = await _supabase
        .from('presentes')
        .select('*')
        .order('nome', { ascending: true });

      const tbodyP = document.getElementById("tabelaPresentes");
      tbodyP.innerHTML = "";

      if (errP) {
        tbodyP.innerHTML = `<tr><td colspan="2">Erro: ${errP.message}</td></tr>`;
      } else if (!presentes || presentes.length === 0) {
        tbodyP.innerHTML = "<tr><td colspan="2">Nenhum presente cadastrado.</td></tr>";
      } else {
        let encontrouPresente = false;
        
        presentes.forEach(p => {
          // Se estiver marcado como reservado ou tiver um nome preenchido em 'reservado_por'
          if (p.reservado === true || p.reservado === 'TRUE' || p.reservado_por) {
            encontrouPresente = true;
            tbodyP.innerHTML += `<tr><td>${p.nome}</td><td>🎁 ${p.reservado_por || 'Nome não informado'}</td></tr>`;
          }
        });

        if (!encontrouPresente) {
          tbodyP.innerHTML = "<tr><td colspan="2">Nenhum presente reservado ainda.</td></tr>";
        }
      }
    }

    // Carrega os dados na tela ao abrir a página
    carregarDadosAdmin();
  </script>
</body>
</html>
