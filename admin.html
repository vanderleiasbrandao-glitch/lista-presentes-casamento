<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Administrador - Noivos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); }
    h1, h2 { color: #d46a92; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0 40px 0; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #d46a92; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    button { background: #d46a92; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; display: block; margin: 0 auto; }
    button:hover { background: #b55376; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Painel de Controle do Casamento</h1>
    <button onclick="buscarDadosDoBanco()">🔄 Atualizar Listas</button>
    
    <h2>Lista de Convidados e Presenças</h2>
    <table>
      <thead>
        <tr>
          <th>Nome do Convidado</th>
          <th>Presença / Resposta</th>
        </tr>
      </thead>
      <tbody id="tabelaConvidados">
        <tr><td colspan="2">Carregando dados...</td></tr>
      </tbody>
    </table>

    <h2>Lista de Presentes Escolhidos</h2>
    <table>
      <thead>
        <tr>
          <th>Presente</th>
          <th>Quem Escolheu</th>
        </tr>
      </thead>
      <tbody id="tabelaPresentes">
        <tr><td colspan="2">Carregando dados...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const URL_BANCO = "https://jncjiqyakzztfgzldshi.supabase.co";
    const CHAVE_BANCO = "sb_publishable_eoGZmq-_cRw0DFr2UY-dig_ZoR4tUnB"; 
    
    const conexaoSupabase = supabase.createClient(URL_BANCO, CHAVE_BANCO, {
      global: { headers: { apikey: CHAVE_BANCO, Authorization: `Bearer ${CHAVE_BANCO}` } }
    });

    async function buscarDadosDoBanco() {
      // 1. BUSCAR CONVIDADOS
      const { data: listaConvidados, error: erroC } = await conexaoSupabase
        .from('convidados')
        .select('*')
        .order('nome', { ascending: true });

      const corpoTabelaC = document.getElementById("tabelaConvidados");
      corpoTabelaC.innerHTML = "";

      if (erroC) {
        corpoTabelaC.innerHTML = `<tr><td colspan="2">Erro: ${erroC.message}</td></tr>`;
      } else if (!listaConvidados || listaConvidados.length === 0) {
        corpoTabelaC.innerHTML = "<tr><td colspan="2">Nenhum convidado cadastrado.</td></tr>";
      } else {
        listaConvidados.forEach(item => {
          let respostaTexto = "❌ Ainda não respondeu";
          if (item.respondido === true || item.respondido === 'TRUE') {
            respostaTexto = item.resposta || "✅ Confirmado";
          }
          corpoTabelaC.innerHTML += `<tr><td><strong>${item.nome}</strong></td><td>${respostaTexto}</td></tr>`;
        });
      }

      // 2. BUSCAR PRESENTES
      const { data: listaPresentes, error: erroP } = await conexaoSupabase
        .from('presentes')
        .select('*')
        .order('nome', { ascending: true });

      const corpoTabelaP = document.getElementById("tabelaPresentes");
      corpoTabelaP.innerHTML = "";

      if (erroP) {
        corpoTabelaP.innerHTML = `<tr><td colspan="2">Erro: ${erroP.message}</td></tr>`;
      } else if (!listaPresentes || listaPresentes.length === 0) {
        corpoTabelaP.innerHTML = "<tr><td colspan="2">Nenhum presente cadastrado.</td></tr>";
      } else {
        let temPresenteReservado = false;
        
        listaPresentes.forEach(produto => {
          if (produto.reservado === true || produto.reservado === 'TRUE' || produto.reservado_por) {
            temPresenteReservado = true;
            corpoTabelaP.innerHTML += `<tr><td>${produto.nome}</td><td>🎁 ${produto.reservado_por || 'Nome não informado'}</td></tr>`;
          }
        });

        if (!temPresenteReservado) {
          corpoTabelaP.innerHTML = "<tr><td colspan="2">Nenhum presente reservado ainda.</td></tr>";
        }
      }
    }

    // Executa a busca assim que o painel abre
    buscarDadosDoBanco();
  </script>
</body>
</html>
