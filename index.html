<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#d46a92;
            color:white;
            text-align:center;
            padding:30px;
        }

        h1{
            font-size:36px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:40px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
        }

        .card{

            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.15);

        }

        .foto{

            width:100%;
            height:220px;
            background:#ececec;

        }

        .conteudo{

            padding:20px;

        }

        .titulo{

            font-size:22px;
            margin-bottom:10px;

        }

        .valor{

            color:#d46a92;
            font-size:22px;
            font-weight:bold;

        }

        .status{

            margin:20px 0;

            color:green;

            font-weight:bold;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:8px;

            background:#d46a92;

            color:white;

            font-size:16px;

            cursor:pointer;

        }

    </style>

</head>

<body>

<header>

<h1>🎁 Lista de Presentes</h1>

<p>Escolha um presente com carinho.</p>

</header>

<div class="container">

<div class="card">

<div class="foto"></div>

<div class="conteudo">

<div class="titulo">

Air Fryer

</div>

<div class="valor">

R$ 399,90

</div>

<div class="status">

🟢 Disponível

</div>

<button>

Escolher presente

</button>

</div>

</div>

</div>

</body>

</html>
